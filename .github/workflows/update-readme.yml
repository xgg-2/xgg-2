name: update readme

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name "xgg-2[bot]"
          git config user.email "xgg-2@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "bot: update README [$(date +'%Y-%m-%d')]"
          git push
